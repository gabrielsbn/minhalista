<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Minha Lista" />
  <meta name="theme-color" content="#080810" />
  <title>Minha Lista</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />


  <style>
    :root {
      --bg:        #080810;
      --surface:   #0f0f1a;
      --card:      #13131f;
      --border:    rgba(255,255,255,0.07);
      --accent:    #e8c87a;
      --accent2:   #7a9ee8;
      --text:      #e8e6e0;
      --muted:     #6b6880;
      --film:      #e8c87a;
      --serie:     #7ab8e8;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, monospace;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── LAYOUT ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    header {
      padding: calc(var(--safe-top) + 18px) 20px 0;
      background: var(--bg);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .header-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .brand h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 32px;
      letter-spacing: -0.5px;
      line-height: 1;
      color: var(--text);
    }

    .brand h1 span { color: var(--accent); font-style: italic; }

    .brand p {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 4px;
    }

    .stats {
      display: flex;
      gap: 16px;
      align-items: flex-end;
    }

    .stat-item { text-align: right; }
    .stat-item .num {
      font-size: 22px;
      font-weight: 500;
      color: var(--accent);
      line-height: 1;
    }
    .stat-item .lbl {
      font-size: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── FILTERS ── */
    .filters {
      display: flex;
      gap: 8px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    input[type=text] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px 9px 32px;
      color: var(--text);
      font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, monospace;
      font-size: 12px;
      outline: none;
      transition: border-color .2s;
    }

    input[type=text]:focus { border-color: rgba(232,200,122,0.3); }
    input[type=text]::placeholder { color: var(--muted); }

    .filter-btns { display: flex; gap: 4px; }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 8px 10px;
      font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, monospace;
      font-size: 10px;
      letter-spacing: 0.5px;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
    }

    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(232,200,122,0.08);
    }

    /* ── LIST ── */
    #list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      -webkit-overflow-scrolling: touch;
    }

    #list::-webkit-scrollbar { display: none; }

    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .empty svg { opacity: 0.3; }

    /* ── CARD ── */
    .card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
      border-radius: 2px;
      position: relative;
    }

    .card:last-child { border-bottom: none; }
    .card:active { background: rgba(255,255,255,0.02); }

    .card-index {
      font-size: 11px;
      color: var(--muted);
      min-width: 24px;
      text-align: right;
      padding-top: 2px;
      flex-shrink: 0;
    }

    .card-body { flex: 1; min-width: 0; }

    .card-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 16px;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .type-badge {
      font-size: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 500;
    }

    .type-badge.filme {
      background: rgba(232,200,122,0.12);
      color: var(--film);
      border: 1px solid rgba(232,200,122,0.2);
    }

    .type-badge.serie {
      background: rgba(122,158,232,0.12);
      color: var(--serie);
      border: 1px solid rgba(122,158,232,0.2);
    }

    .card-year { font-size: 11px; color: var(--muted); }

    .card-genres {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 4px;
    }

    .card-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .imdb-score {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .imdb-star { color: var(--accent); font-size: 12px; }
    .imdb-num { font-size: 13px; font-weight: 500; color: var(--accent); }

    .card-dir { font-size: 9px; color: var(--muted); text-align: right; max-width: 100px; line-height: 1.3; }

    /* ── ADD BAR ── */
    #add-bar {
      padding: 12px 16px calc(var(--safe-bot) + 12px);
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .add-inner {
      display: flex;
      gap: 8px;
    }

    #add-input {
      padding-left: 12px;
    }

    #add-btn {
      background: var(--accent);
      color: #080810;
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, monospace;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s;
      letter-spacing: 0.5px;
    }

    #add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #add-status {
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
      min-height: 14px;
      padding: 0 2px;
      transition: color .2s;
    }

    #add-status.error { color: #e87a7a; }
    #add-status.success { color: #7ae8a0; }

    /* ── MODAL ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 100;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      align-items: flex-end;
    }

    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 0 0 calc(var(--safe-bot) + 20px);
      width: 100%;
      max-height: 88dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      animation: slide-up .25s cubic-bezier(.32,.72,0,1);
    }

    #modal::-webkit-scrollbar { display: none; }

    @keyframes slide-up {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-drag {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
    }

    .modal-header {
      padding: 20px 20px 0;
    }

    .modal-type-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .modal-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 26px;
      line-height: 1.15;
      color: var(--text);
    }

    .modal-title-en {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      margin-top: 4px;
    }

    .modal-score-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 16px 20px;
      padding: 14px 16px;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .modal-imdb {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .modal-imdb .big-score {
      font-size: 32px;
      font-weight: 500;
      color: var(--accent);
      line-height: 1;
    }

    .modal-imdb .score-label {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    .score-divider {
      width: 1px;
      height: 36px;
      background: var(--border);
    }

    .modal-genres {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      flex: 1;
    }

    .genre-pill {
      font-size: 9px;
      letter-spacing: 0.5px;
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: rgba(255,255,255,0.03);
    }

    .modal-section {
      padding: 0 20px;
      margin-bottom: 16px;
    }

    .section-label {
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .section-value {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
    }

    .section-value.highlight { color: var(--accent2); }

    .sinopse-block {
      padding: 14px 16px;
      background: var(--surface);
      border-radius: 10px;
      border-left: 2px solid var(--accent);
      font-size: 13px;
      line-height: 1.8;
      color: #b0aeb8;
    }

    .close-modal {
      display: block;
      margin: 8px 20px 0;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, monospace;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      width: calc(100% - 40px);
      transition: all .15s;
    }

    .close-modal:active { background: rgba(255,255,255,0.05); }

    /* ── LOADER ── */
    .loader {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(232,200,122,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DIVIDERS ── */
    .list-section-title {
      font-size: 8px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 16px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="header-top">
      <div class="brand">
        <h1>Minha <span>Lista</span></h1>
        <p>Letterbox Pessoal</p>
      </div>
      <div class="stats">
        <div class="stat-item">
          <div class="num" id="stat-filmes">0</div>
          <div class="lbl">Filmes</div>

        <div class="stat-item">
          <div class="num" id="stat-series">0</div>
          <div class="lbl">Séries</div>
        </div>
      </div>
    </div>
  </header>

  <div class="filters">
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Buscar título, gênero..." autocomplete="off" autocorrect="off" />
    </div>
    <div class="filter-btns">
      <button class="filter-btn active" data-f="todos">Todos</button>
      <button class="filter-btn" data-f="filme">Filmes</button>
      <button class="filter-btn" data-f="serie">Séries</button>
    </div>
  </div>

  <div id="list"></div>

  <div id="add-bar">
    <div class="add-inner">
      <input type="text" id="add-input" placeholder="Adicionar título..." autocomplete="off" autocorrect="off" />
      <button id="add-btn">+ Salvar</button>
    </div>
    <div id="add-status"></div>
  </div>

</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-drag"></div>
    <div id="modal-content"></div>
    <button class="close-modal" onclick="closeModal()">Fechar</button>
  </div>
</div>

<script>
// ── STATE ──
const STORAGE_KEY = 'minhalista_catalog_v1';
let catalog = [];
let activeFilter = 'todos';
let searchQuery = '';

// ── INIT ──
function init() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length > 0) {
        catalog = parsed;
        render();
        return;
      }
    }
  } catch(e) {}
  // Primeira vez: usar dados embutidos
  catalog = [...CATALOG];
  persist();
  render();


}

// ── PERSIST ──
function persist() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(catalog)); } catch(e) {}
}

// ── RENDER LIST ──
function render() {
  const list = document.getElementById('list');
  const q = searchQuery.toLowerCase().trim();

  let items = catalog.filter(item => {
    const matchFilter = activeFilter === 'todos'
      || (activeFilter === 'filme' && item.tipo === 'Filme')
      || (activeFilter === 'serie' && item.tipo === 'Série');

    const matchSearch = !q
      || item.titulo_pt.toLowerCase().includes(q)
      || item.titulo_en.toLowerCase().includes(q)
      || (item.genero || []).some(g => g.toLowerCase().includes(q))
      || (item.diretor || '').toLowerCase().includes(q)
      || (item.elenco || []).some(a => a.toLowerCase().includes(q));

    return matchFilter && matchSearch;
  });

  // Stats
  const filmes = catalog.filter(i => i.tipo === 'Filme').length;
  const series = catalog.filter(i => i.tipo === 'Série').length;
  document.getElementById('stat-filmes').textContent = filmes;
  document.getElementById('stat-series').textContent = series;

  if (items.length === 0) {
    list.innerHTML = `<div class="empty">
      <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M7 4v16M17 4v16M3 8h4m10 0h4M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"/></svg>
      <span>Nenhuma obra encontrada</span>
    </div>`;
    return;
  }

  // Separar em grupos se não estiver filtrando por tipo
  let html = '';

  if (activeFilter === 'todos' && !q) {
    const filmesList = items.filter(i => i.tipo === 'Filme');
    const seriesList = items.filter(i => i.tipo === 'Série');
    if (seriesList.length) {
      html += `<div class="list-section-title">Séries — ${seriesList.length}</div>`;
      html += seriesList.map((item, i) => cardHTML(item, i + 1)).join('');
    }
    if (filmesList.length) {
      html += `<div class="list-section-title">Filmes — ${filmesList.length}</div>`;
      html += filmesList.map((item, i) => cardHTML(item, i + 1)).join('');
    }
  } else {
    html = items.map((item, i) => cardHTML(item, i + 1)).join('');
  }

  list.innerHTML = html;

  // Events
  list.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => {
      const slug = el.dataset.slug;
      const item = catalog.find(c => c.slug === slug);
      if (item) openModal(item);
    });
  });
}

function cardHTML(item, index) {
  const genres = (item.genero || []).slice(0, 2).join(' · ');
  const badgeClass = item.tipo === 'Série' ? 'serie' : 'filme';
  const dirShort = (item.diretor || '').split('/')[0].trim().split(' ').slice(-1)[0];
  return `
    <div class="card" data-slug="${item.slug}">
      <div class="card-index">${String(index).padStart(2,'0')}</div>
      <div class="card-body">
        <div class="card-title">${item.titulo_pt}</div>
        <div class="card-meta">
          <span class="type-badge ${badgeClass}">${item.tipo}</span>
          <span class="card-year">${item.ano}</span>
        </div>
        <div class="card-genres">${genres}</div>
      </div>
      <div class="card-right">
        <div class="imdb-score">
          <span class="imdb-star">★</span>
          <span class="imdb-num">${item.nota_imdb || '—'}</span>
        </div>
        <div class="card-dir">${dirShort}</div>
      </div>
    </div>`;
}

// ── MODAL ──
function openModal(item) {
  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');
  const badgeClass = item.tipo === 'Série' ? 'serie' : 'filme';
  const elenco = (item.elenco || []).join(', ');
  const streaming = (item.onde_assistir || []).join(' · ');
  const genres = (item.genero || []).map(g => `<span class="genre-pill">${g}</span>`).join('');

  content.innerHTML = `
    <div class="modal-header">
      <div class="modal-type-row">
        <span class="type-badge ${badgeClass}">${item.tipo}</span>
        <span style="font-size:11px;color:var(--muted)">${item.ano}</span>
      </div>
      <div class="modal-title">${item.titulo_pt}</div>
      ${item.titulo_pt !== item.titulo_en ? `<div class="modal-title-en">${item.titulo_en}</div>` : ''}
    </div>

    <div class="modal-score-row">
      <div class="modal-imdb">
        <div class="big-score">${item.nota_imdb || '—'}</div>
        <div class="score-label">IMDb</div>
      </div>
      <div class="score-divider"></div>
      <div class="modal-genres">${genres}</div>
    </div>

    ${item.diretor ? `
    <div class="modal-section">
      <div class="section-label">${item.tipo === 'Série' ? 'Criador / Showrunner' : 'Diretor'}</div>
      <div class="section-value">${item.diretor}</div>
    </div>` : ''}

    ${elenco ? `
    <div class="modal-section">
      <div class="section-label">Elenco</div>
      <div class="section-value">${elenco}</div>
    </div>` : ''}

    ${streaming ? `
    <div class="modal-section">
      <div class="section-label">Onde Assistir</div>
      <div class="section-value highlight">${streaming}</div>
    </div>` : ''}

    ${item.sinopse ? `
    <div class="modal-section">
      <div class="section-label">Sinopse</div>
      <div class="sinopse-block">${item.sinopse}</div>
    </div>` : ''}
  `;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ── FILTERS ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.f;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

// ── ADD TITLE ──
const addInput  = document.getElementById('add-input');
const addBtn    = document.getElementById('add-btn');
const addStatus = document.getElementById('add-status');

async function addTitle() {
  const raw = addInput.value.trim();
  if (!raw) return;

  addBtn.disabled = true;
  addStatus.className = '';
  addStatus.innerHTML = '<span class="loader"></span>Buscando informações...';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `Você é especialista em cinema e séries. Para o título fornecido, retorne APENAS um objeto JSON (sem markdown, sem código, sem explicação) com estes campos exatos:
{
  "titulo_pt": "Título em português",
  "titulo_en": "Título em inglês original",
  "tipo": "Filme",
  "ano": 1999,
  "genero": ["Ação"],
  "nota_imdb": 8.7,
  "diretor": "Nome",
  "elenco": ["Ator 1", "Ator 2", "Ator 3", "Ator 4"],
  "onde_assistir": ["Netflix"],
  "sinopse": "2-3 frases em português.",
  "slug": "titulo-ano"
}
Tipo deve ser exatamente "Filme" ou "Série".
Retorne SOMENTE o JSON.`,
        messages: [{ role: 'user', content: `Título: ${raw}` }]
      })
    });

    const data = await response.json();
    const text = (data.content || []).find(b => b.type === 'text')?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const item = JSON.parse(clean);

    // Garantir slug único
    if (!item.slug) item.slug = raw.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '') + '-' + item.ano;
    if (catalog.find(c => c.slug === item.slug)) {
      item.slug = item.slug + '-' + Date.now();
    }

    catalog.push(item);
    persist();
    render();

    addInput.value = '';
    addStatus.className = 'success';
    addStatus.textContent = `✓ "${item.titulo_pt}" adicionado`;
    setTimeout(() => { addStatus.textContent = ''; }, 3000);

  } catch(err) {
    addStatus.className = 'error';
    addStatus.textContent = 'Não foi possível buscar. Tente novamente.';
  }

  addBtn.disabled = false;
}

addBtn.addEventListener('click', addTitle);
addInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTitle(); });

// ── START ──
init();
</script>
